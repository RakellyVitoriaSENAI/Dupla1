<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReadSpace - Edit Book</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <div class="form-container">
            <header class="form-header">
                <h2>Edit Book</h2>
                <button class="delete-btn">🗑️ Delete</button>
            </header>

            <form>
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" value="O Grande Gatsby">
                </div>
                <div class="current-file">
                    <span>📄 gatsby_classic.pdf</span>
                    <label for="pdf-input" style="color:blue; cursor:pointer">Change</label>
                </div>
                <button type="submit" class="submit-btn">Update Changes</button>
                <a href="books.html" class="back-link">Back to library</a>
            </form>
        </div>
    </main>
</body>
</html>
