<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Livros - Admin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/assets/css/style.css">
</head>

<body>

    <!-- HEADER -->

    <header class="header">
        <div class="container nav-container">
            <img class="logo" src="/static/assets/img/logo.png">

            <nav>
                <ul class="nav-links">
                    <li><a href="/">Início</a></li>
                    <li><a href="/livros">Livros</a></li>
                </ul>
            </nav>

        </div>
    </header>

    <!-- ADMIN -->

    <section class="page-section">

        <div class="container">

            <div class="admin-alert">
                <h4>Área Restrita</h4>
                <p>
                    Apenas administradores podem cadastrar livros no sistema.
                </p>
            </div>

            <div class="form-container admin-form">

                <div class="section-title">
                    <span>Administrador</span>
                    <h2>Cadastrar Novo Livro</h2>
                </div>

                <form action="/livros/admin/criar" method="post" enctype="multipart/form-data">

                    <div class="row">

                        <div class="col-md-6 mb-3">
                            <label>Título do Livro</label>
                            <input type="text" name="titulo" class="form-control">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label>Autor</label>
                            <input type="text" name="autor" class="form-control">
                        </div>

                    </div>

                    <div class="row">

                        <div class="col-md-4 mb-3">
                            <label>Gênero</label>
                            <input type="text" name="categoria" class="form-control">
                        </div>


                        <div class="col-md-4 mb-3">
                            <label>Data De Publicação</label>
                            <input type="date" name="ano_publicacao" class="form-control">
                        </div>

                    </div>

                    <div class="mb-3">
                        <label>Descrição</label>
                        <textarea class="form-control" name="descricao" rows="5"></textarea>
                    </div>
                    <div class="mb-4">
                        <label>Imagem da Capa</label>
                        <input type="file" name="foto" class="form-control">
                    </div>
                    <div class="d-flex gap-2">
                      <button type="submit" class="btn btn-primary">Salvar</button>
                      <a href="/livros/admin" class="btn btn-secondary">Voltar</a>
                    </div>

                </form>

            </div>

        </div>

    </section>

</body>

</html>
