<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReadSpace - Add Book</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <div class="form-container">
            <header class="form-header">
                <h2>Add New Book</h2>
                <a href="books.html" class="cancel-btn">✕ Cancel</a>
            </header>

            <form>
                <div class="form-row">
                    <div class="form-group"><label>Title *</label><input type="text" required></div>
                    <div class="form-group"><label>Author *</label><input type="text" required></div>
                </div>
                
                <div class="upload-area" id="drop-zone">
                    <input type="file" id="pdf-input" accept="application/pdf" hidden>
                    <p id="upload-text">📤 Click to upload PDF</p>
                </div>

                <button type="submit" class="submit-btn">Save Book</button>
            </form>
        </div>
    </main>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const pdfInput = document.getElementById('pdf-input');
        dropZone.onclick = () => pdfInput.click();
        pdfInput.onchange = () => {
            document.getElementById('upload-text').innerText = "Selected: " + pdfInput.files[0].name;
        };
    </script>
</body>
</html>
