<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReadSpace - Home</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <div class="logo">📖 <strong>ReadSpace</strong></div>
        <nav>
            <a href="index.html" class="nav-item active">🏠 Home</a>
            <a href="books.html" class="nav-item">📚 Books</a>
        </nav>
        <div class="user-menu">
            <span class="avatar">R</span>
            <button class="logout-btn">Logout</button>
        </div>
    </header>

    <main class="container">
        <section class="welcome-section">
            <h1>Welcome back, Rakelly</h1>
            <p>Aqui está o que está acontecendo na sua biblioteca.</p>
        </section>

        <section class="stats-grid">
            <div class="card">
                <span class="label">Active Loans</span>
                <div class="value">1</div>
            </div>
            <div class="card">
                <span class="label">Total Books</span>
                <div class="value">3</div>
            </div>
        </section>

        <section class="recent-activity">
            <h2>Recent Activity</h2>
            <div class="activity-item">
                <span class="dot green"></span>
                <p>Loan active - Due: 17/05/2026</p>
            </div>
        </section>
    </main>
</body>
</html>
