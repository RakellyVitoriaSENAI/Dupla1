<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReadSpace - Collection</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <div class="logo">📖 <strong>ReadSpace</strong></div>
        <nav>
            <a href="index.html" class="nav-item">🏠 Home</a>
            <a href="books.html" class="nav-item active">📚 Books</a>
        </nav>
    </header>

    <main class="container">
        <header class="section-header">
            <h1>Book Collection</h1>
            <a href="add-book.html" class="add-btn">+ Add Book</a>
        </header>

        <div class="book-grid">
            <div class="book-card">
                <div class="book-cover">
                    <span class="pdf-badge">📄 PDF</span>
                    <p>No Cover</p>
                </div>
                <div class="book-info">
                    <h3>Exemplo de Livro</h3>
                    <p class="author">Autor Nome</p>
                    <div class="book-meta">
                        <span class="category-tag">Classic</span>
                        <a href="edit-book.html" class="edit-link">✏️ Edit</a>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
